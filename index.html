<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <div>
        <div class="logo">Справочник Стран</div>
        <div class="subtitle">Поиск стран с информацией</div>
    </div>

    <div class="nav-actions">
        <button onclick="showHelp()">Помощь</button>
        <button onclick="randomCountry()">🎲 Случайная</button>
        <button id="themeBtn" onclick="toggleTheme()">🌙</button>

    </div>
</nav>

<div class="container">

    <div class="tabs">
    <button onclick="setTab('all')" id="tab-all" class="tab active">Все страны</button>
    <button onclick="setTab('fav')" id="tab-fav" class="tab">Избранное</button>
</div>

<input id="country"
       placeholder="Поиск..."
       oninput="showList(); filterGrid();"
       onkeydown="handleKey(event)"
       autocomplete="off">

<div id="dropdown"></div>

<div id="result"></div>

<div id="grid"></div>

<div id="favorites"></div>

</div>

<script src="countries.js"></script>
<script src="app.js"></script>

</body>
</html>
